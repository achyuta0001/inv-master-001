spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inv_master_001}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    ignore-missing-migrations: true

  http:
    client:
      connect-timeout: 10s
      read-timeout: 30s

  ai:
    retry:
      max-attempts: 2
      backoff:
        initial-interval: 1s
        multiplier: 2
        max-interval: 5s
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile

jwt:
  # No default: the app must fail to start rather than silently sign tokens
  # with a secret that is public in source control. Set JWT_SECRET in every
  # environment (see .env.example). Generate one with: openssl rand -base64 32
  secret: ${JWT_SECRET}

server:
  port: ${PORT:8080}
